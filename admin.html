<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Edit Packages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f4f4f6; }
    body {
      font-family: "Nunito Sans", -apple-system, Arial, sans-serif;
      color: #161823; font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Header ---- */
    .admin-header {
      background: #161823; color: #fff;
      padding: 14px 20px; display: flex;
      align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .admin-header h1 {
      font-size: 18px; font-weight: 800; margin: 0;
      display: flex; align-items: center; gap: 10px;
    }
    .header-btns { display: flex; gap: 10px; align-items: center; }
    .btn-preview {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,.4);
      color: #fff; padding: 7px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-decoration: none; font-family: inherit;
    }
    .btn-preview:hover { border-color: #fff; }
    .server-badge {
      font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      background: rgba(255,255,255,.1);
    }
    .server-badge.online  { background: rgba(46,204,113,.25); color: #2ecc71; }
    .server-badge.offline { background: rgba(231,76,60,.25);  color: #e74c3c; }

    /* ---- Login ---- */
    #login-screen {
      max-width: 380px; margin: 80px auto; padding: 0 16px;
    }
    .login-box {
      background: #fff; border-radius: 16px; padding: 32px 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08); text-align: center;
    }
    .login-logo { font-size: 40px; margin-bottom: 8px; }
    .login-box h2 { margin: 0 0 6px; font-size: 22px; font-weight: 800; }
    .login-box p  { margin: 0 0 24px; color: #666; font-size: 14px; }
    .login-input {
      width: 100%; height: 50px; padding: 0 14px;
      border: 1.5px solid #d4d4d8; border-radius: 10px;
      font-size: 16px; font-family: inherit;
      outline: none; margin-bottom: 14px;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: #fe2c55; box-shadow: 0 0 0 3px rgba(254,44,85,.1); }
    .btn-login {
      width: 100%; height: 50px;
      background: #fe2c55; color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 800;
      font-family: inherit; cursor: pointer;
      transition: background .15s;
    }
    .btn-login:hover { background: #f01d49; }
    .login-error {
      color: #b42318; font-size: 13px;
      margin-top: 10px; display: none;
      padding: 10px; background: #fef3f2;
      border-radius: 8px;
    }
    .login-hint {
      font-size: 12px; color: #aaa; margin-top: 14px;
      padding-top: 14px; border-top: 1px solid #f0f0f0;
    }

    /* ---- Admin content ---- */
    #admin-content {
      display: none; max-width: 820px;
      margin: 0 auto; padding: 24px 16px 60px;
    }

    /* Status banner */
    .status-banner {
      border-radius: 10px; padding: 12px 16px;
      margin-bottom: 18px; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
    }
    .status-banner.ok   { background: #ecfdf3; color: #067647; border: 1px solid #c3e8d0; }
    .status-banner.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .status-banner.err  { background: #fef3f2; color: #b42318; border: 1px solid #fecaca; }
    .banner-icon { font-size: 18px; flex-shrink: 0; }
    .banner-text { flex: 1; }
    .banner-text small { font-weight: 400; display: block; margin-top: 2px; opacity: .75; }
    .retry-btn {
      background: #fff; border: 1px solid currentColor;
      color: inherit; padding: 5px 12px; border-radius: 6px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit;
    }

    /* Top bar */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
    }
    .top-bar h2 { margin: 0; font-size: 20px; font-weight: 800; }
    .top-actions { display: flex; gap: 10px; }
    .btn-add {
      background: #161823; color: #fff; border: none;
      padding: 10px 18px; border-radius: 10px;
      font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer;
    }
    .btn-add:hover { background: #2d2f3a; }
    .btn-save {
      background: #00a550; color: #fff; border: none;
      padding: 10px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-save:hover:not(:disabled) { background: #008a44; }
    .btn-save:disabled { opacity: .45; cursor: not-allowed; }

    /* Stats */
    .stats-bar {
      display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .stat-pill {
      background: #fff; border: 1px solid #eee;
      border-radius: 10px; padding: 10px 16px;
      font-size: 13px; color: #666;
    }
    .stat-pill strong { color: #161823; font-size: 15px; display: block; }

    /* Table */
    .packages-table {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05); overflow: hidden;
    }
    .table-head {
      display: grid;
      grid-template-columns: 36px 1fr 110px 110px 130px 80px 52px;
      gap: 6px; padding: 11px 14px;
      background: #f8f8fa; border-bottom: 1px solid #eee;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px; color: #888;
    }
    .pkg-row {
      display: grid;
      grid-template-columns: 36px 1fr 110px 110px 130px 80px 52px;
      gap: 6px; padding: 10px 14px;
      border-bottom: 1px solid #f0f0f2;
      align-items: center; transition: background .1s;
    }
    .pkg-row:last-child { border-bottom: none; }
    .pkg-row:hover { background: #fafafa; }
    .pkg-row.row-drag-over { border-top: 2px solid #fe2c55; }
    .pkg-row.row-dragging  { opacity: .45; }
    .pkg-row input[type="text"],
    .pkg-row input[type="number"] {
      width: 100%; height: 36px; padding: 0 10px;
      border: 1.5px solid #e5e5e8; border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    .pkg-row input:focus { border-color: #fe2c55; box-shadow: 0 0 0 2px rgba(254,44,85,.1); }
    .drag-handle {
      cursor: grab; color: #ccc; font-size: 18px;
      text-align: center; user-select: none;
    }
    .drag-handle:hover { color: #666; }
    .toggle {
      position: relative; width: 40px; height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: #ddd;
      border-radius: 11px; cursor: pointer; transition: background .2s;
    }
    .toggle-slider::before {
      content: ""; position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px; background: #fff;
      border-radius: 50%; transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: #00a550; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
    .btn-del {
      background: none; border: none; color: #e02020;
      font-size: 18px; cursor: pointer; padding: 4px;
      border-radius: 6px; transition: background .1s;
    }
    .btn-del:hover { background: #fef3f2; }

    /* Save notice */
    .save-notice {
      background: #ecfdf3; border: 1px solid #c3e8d0;
      border-radius: 10px; padding: 12px 16px;
      color: #067647; font-weight: 600; font-size: 14px;
      margin-bottom: 16px; display: none;
    }

    /* Responsive */
    @media (max-width: 620px) {
      .table-head, .pkg-row {
        grid-template-columns: 28px 1fr 90px 90px 80px 52px;
        gap: 5px; padding: 9px 10px; font-size: 13px;
      }
      .col-badge, .badge-cell { display: none; }
    }
    @media (max-width: 420px) {
      .table-head, .pkg-row {
        grid-template-columns: 24px 1fr 80px 80px 52px;
      }
      .col-label, .label-cell { display: none; }
    }
  </style>
</head>
<body>

<div class="admin-header">
  <h1>🎛 Package Editor</h1>
  <div class="header-btns">
    <span class="server-badge" id="server-badge">Checking…</span>
    <a href="/" class="btn-preview" target="_blank">View Site ↗</a>
  </div>
</div>

<!-- ---- Login ---- -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <h2>Admin Login</h2>
    <p>Enter your admin password to manage packages</p>
    <input type="password" id="pwd-input" class="login-input"
      placeholder="Admin password"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn-login" onclick="doLogin()">Login</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint">
      Default password: <code>admin1234</code><br>
      Change via <code>ADMIN_PASSWORD</code> in your .env
    </div>
  </div>
</div>

<!-- ---- Admin content ---- -->
<div id="admin-content">

  <div class="status-banner" id="status-banner" style="display:none"></div>
  <div class="save-notice" id="save-notice">✓ Packages saved to server successfully!</div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="top-bar">
    <h2>Follower Packages</h2>
    <div class="top-actions">
      <button class="btn-add" onclick="addPackage()">+ Add Package</button>
      <button class="btn-save" id="save-btn" onclick="savePackages()">
        💾 Save Changes
      </button>
    </div>
  </div>

  <div class="packages-table">
    <div class="table-head">
      <div></div>
      <div>Followers</div>
      <div>Price (KES)</div>
      <div class="col-label">Label</div>
      <div class="col-badge">Badge</div>
      <div>Active</div>
      <div></div>
    </div>
    <div id="pkg-list"></div>
  </div>

</div>

<script>
// -------------------------------------------------------
// DEFAULT PACKAGES — used when server is unreachable
// -------------------------------------------------------
var DEFAULT_PACKAGES = [
  { id:'p100', followers:100,   price:50,   label:'100',    badge:null,          active:true },
  { id:'p500', followers:500,   price:200,  label:'500',    badge:null,          active:true },
  { id:'p1k',  followers:1000,  price:350,  label:'1,000',  badge:'Popular',     active:true },
  { id:'p2k',  followers:2000,  price:620,  label:'2,000',  badge:null,          active:true },
  { id:'p5k',  followers:5000,  price:1400, label:'5,000',  badge:'Best Value',  active:true },
  { id:'p10k', followers:10000, price:2500, label:'10,000', badge:null,          active:true },
  { id:'p25k', followers:25000, price:5500, label:'25,000', badge:null,          active:true },
  { id:'p50k', followers:50000, price:9500, label:'50,000', badge:'🔥 Mega',     active:true }
];

var adminPwd   = '';
var packages   = [];
var dragSrcIdx = null;

// -------------------------------------------------------
// LOGIN
// -------------------------------------------------------
function doLogin() {
  var pwd = document.getElementById('pwd-input').value.trim();
  if (!pwd) { showLoginError('Please enter a password.'); return; }
  adminPwd = pwd;
  document.getElementById('login-screen').style.display  = 'none';
  document.getElementById('admin-content').style.display = 'block';

  // Load from localStorage immediately (instant)
  var cached = null;
  try {
    var raw = localStorage.getItem('tiktok_admin_packages');
    if (raw) cached = JSON.parse(raw);
  } catch(e) {}
  packages = (cached && cached.length) ? cached
           : DEFAULT_PACKAGES.map(function(p){ return Object.assign({}, p); });
  renderTable();
  renderStats();

  // Then sync from server in background
  syncFromServer();
}

function showLoginError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// -------------------------------------------------------
// SYNC FROM SERVER
// -------------------------------------------------------
function syncFromServer() {
  updateBadge('checking');
  setBanner('info', '⏳', 'Connecting…', 'Loading latest packages from server');

  fetch('/api/packages', { cache:'no-store' })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      updateBadge('online');
      if (data.packages && data.packages.length) {
        packages = data.packages;
        try { localStorage.setItem('tiktok_admin_packages', JSON.stringify(packages)); } catch(e) {}
        renderTable();
        renderStats();
        setBanner('ok', '✅', 'Server connected', 'Packages loaded — changes save to Redis + live site instantly');
      } else {
        setBanner('ok', '✅', 'Server connected', 'No packages saved yet. Edit below then click Save Changes.');
      }
    })
    .catch(function(err) {
      updateBadge('offline');
      setBanner('warn', '⚠️',
        'Server not reachable',
        'Editing locally. Changes stay in browser until server is reachable.',
        true);
      console.warn('[Admin] sync error:', err.message);
    });
}

function updateBadge(state) {
  var b = document.getElementById('server-badge');
  b.className = 'server-badge ' + (state === 'online' ? 'online' : state === 'offline' ? 'offline' : '');
  b.textContent = state === 'online'  ? '● Server online'
                : state === 'offline' ? '● Server offline'
                : 'Connecting…';
}

function setBanner(type, icon, title, sub, showRetry) {
  var el = document.getElementById('status-banner');
  el.className = 'status-banner ' + (type === 'info' ? 'warn' : type);
  el.style.display = 'flex';
  el.innerHTML =
    '<span class="banner-icon">' + icon + '</span>' +
    '<div class="banner-text"><strong>' + title + '</strong>' +
      '<small>' + sub + '</small></div>' +
    (showRetry ? '<button class="retry-btn" onclick="syncFromServer()">Retry</button>' : '');
}

// -------------------------------------------------------
// TABLE
// -------------------------------------------------------
function renderTable() {
  var list = document.getElementById('pkg-list');
  list.innerHTML = packages.map(function(pkg, i) {
    var checked = pkg.active !== false ? ' checked' : '';
    var badge   = (pkg.badge || '').replace(/"/g,'&quot;');
    var label   = (pkg.label || '').replace(/"/g,'&quot;');
    return [
      '<div class="pkg-row" draggable="true" data-idx="'+i+'"',
      ' ondragstart="dStart(event,'+i+')"',
      ' ondragover="dOver(event)"',
      ' ondrop="dDrop(event,'+i+')"',
      ' ondragleave="dLeave(event)">',
        '<div class="drag-handle" title="Drag to reorder">⠿</div>',
        '<div><input type="number" value="'+pkg.followers+'" min="1" placeholder="Followers"',
          ' onchange="updatePkg('+i+',\'followers\',this.value)"></div>',
        '<div><input type="number" value="'+pkg.price+'" min="1" placeholder="KES"',
          ' onchange="updatePkg('+i+',\'price\',this.value)"></div>',
        '<div class="label-cell"><input type="text" value="'+label+'" placeholder="e.g. 1,000"',
          ' onchange="updatePkg('+i+',\'label\',this.value)"></div>',
        '<div class="badge-cell"><input type="text" value="'+badge+'" placeholder="Popular…"',
          ' onchange="updatePkg('+i+',\'badge\',this.value)"></div>',
        '<div><label class="toggle">',
          '<input type="checkbox"'+checked+' onchange="updatePkg('+i+',\'active\',this.checked)">',
          '<span class="toggle-slider"></span></label></div>',
        '<div><button class="btn-del" onclick="deletePkg('+i+')" title="Delete">✕</button></div>',
      '</div>'
    ].join('');
  }).join('');
}

function renderStats() {
  var active = packages.filter(function(p){ return p.active !== false; });
  var prices  = active.map(function(p){ return p.price; });
  var minP    = prices.length ? Math.min.apply(null, prices) : 0;
  var maxP    = prices.length ? Math.max.apply(null, prices) : 0;
  document.getElementById('stats-bar').innerHTML =
    '<div class="stat-pill"><strong>'+packages.length+'</strong>Total</div>'+
    '<div class="stat-pill"><strong>'+active.length+'</strong>Active</div>'+
    '<div class="stat-pill"><strong>KES '+minP.toLocaleString()+'</strong>Cheapest</div>'+
    '<div class="stat-pill"><strong>KES '+maxP.toLocaleString()+'</strong>Highest</div>';
}

// -------------------------------------------------------
// CRUD
// -------------------------------------------------------
function updatePkg(idx, key, val) {
  if (key === 'followers' || key === 'price') packages[idx][key] = Number(val);
  else if (key === 'active') packages[idx][key] = !!val;
  else packages[idx][key] = val.trim() || null;
  try { localStorage.setItem('tiktok_admin_packages', JSON.stringify(packages)); } catch(e) {}
  renderStats();
}

function addPackage() {
  packages.push({ id:'p'+Date.now(), followers:1000, price:350, label:'1,000', badge:null, active:true });
  renderTable(); renderStats();
  var last = document.getElementById('pkg-list').lastElementChild;
  if (last) last.scrollIntoView({ behavior:'smooth' });
}

function deletePkg(idx) {
  if (!confirm('Delete this package?')) return;
  packages.splice(idx, 1);
  renderTable(); renderStats();
}

// -------------------------------------------------------
// DRAG
// -------------------------------------------------------
function dStart(e,idx){ dragSrcIdx=idx; e.currentTarget.classList.add('row-dragging'); }
function dOver(e){ e.preventDefault(); e.currentTarget.classList.add('row-drag-over'); }
function dLeave(e){ e.currentTarget.classList.remove('row-drag-over'); }
function dDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.pkg-row').forEach(function(r){
    r.classList.remove('row-drag-over','row-dragging');
  });
  if (dragSrcIdx === null || dragSrcIdx === idx) return;
  var moved = packages.splice(dragSrcIdx, 1)[0];
  packages.splice(idx, 0, moved);
  dragSrcIdx = null;
  renderTable(); renderStats();
}

// -------------------------------------------------------
// SAVE — always try server, never silently block
// -------------------------------------------------------
function savePackages() {
  var btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Saving…';

  // Always save to localStorage first (instant, no risk)
  try { localStorage.setItem('tiktok_admin_packages', JSON.stringify(packages)); } catch(e) {}

  fetch('/api/packages', {
    method: 'POST',
    headers: {
      'Content-Type':    'application/json',
      'X-Admin-Password': adminPwd
    },
    body: JSON.stringify({ packages: packages, adminPassword: adminPwd })
  })
  .then(function(r) {
    return r.json().then(function(data){ return { ok: r.ok, status: r.status, data: data }; });
  })
  .then(function(resp) {
    btn.disabled = false;
    btn.innerHTML = '💾 Save Changes';

    if (resp.data.success) {
      updateBadge('online');
      var notice = document.getElementById('save-notice');
      notice.style.display = 'block';
      setBanner('ok', '✅', 'Saved!', 'Packages updated in Redis — live site reflects changes immediately.');
      setTimeout(function(){ notice.style.display = 'none'; }, 4000);
    } else if (resp.status === 401 || (resp.data.message && resp.data.message.toLowerCase().includes('password'))) {
      setBanner('err', '🔒', 'Wrong password',
        'The password does not match ADMIN_PASSWORD on the server. Check your .env / Vercel env vars.');
    } else {
      setBanner('err', '❌', 'Save failed', resp.data.message || 'Unknown server error');
    }
  })
  .catch(function(err) {
    btn.disabled = false;
    btn.innerHTML = '💾 Save Changes';
    updateBadge('offline');
    setBanner('warn', '💾', 'Saved to browser only',
      'Server unreachable — changes are in localStorage. ' +
      'Fix the server connection and click Save again to persist to Redis.',
      true);
    console.warn('[Admin] save error:', err.message);
  });
}
</script>
</body>
</html>
